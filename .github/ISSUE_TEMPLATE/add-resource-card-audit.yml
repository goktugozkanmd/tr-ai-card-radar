name: Add resource card audit
description: Suggest a Turkish AI model or dataset card for metadata audit.
title: "Add card audit: "
labels: ["resource-audit"]
body:
  - type: input
    id: repo_id
    attributes:
      label: Hugging Face repo id
      placeholder: "owner/repository"
    validations:
      required: true
  - type: dropdown
    id: repo_type
    attributes:
      label: Repository type
      options:
        - model
        - dataset
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Public source URL
      placeholder: "https://huggingface.co/..."
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this resource belongs here
      description: Keep this factual. Do not paste protected dataset rows.
    validations:
      required: true
  - type: input
    id: checked_date
    attributes:
      label: Checked date
      placeholder: "YYYY MM DD"
    validations:
      required: true
